<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista Grupe</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}" />
</head>
<body>
<header>
    <h1>Grupe Competiționale</h1>
</header>
<main>
    <div class="lista-container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 20px">
            <a th:href="@{/grupe/adauga}" class="buton-adauga">+ Adaugă Grupă</a>

            <form th:action="@{/grupe}" method="get" style="display: flex; gap: 8px; align-items: center;">
                <input type="text" name="keyword" th:value="${keyword}" class="input-cautare" placeholder="Caută">
                <button type="submit" class="btn-cautare-base btn-albastru">Caută</button>
                <a th:href="@{/grupe}" class="btn-cautare-base btn-gri">Resetează</a>
            </form>
        </div>

        <div th:if="${mesajEroare}"
             style="background-color: #f8d7da; color: #721c24; padding: 15px; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong>Eroare la ștergere:</strong>
            <span>Acest element este legat de alte înregistrări active.</span>
        </div>

        <div th:if="${mesajSucces}"
             style="background-color: #d4edda; color: #155724; padding: 15px; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong> Succes:</strong> <span th:text="${mesajSucces}"></span>
        </div>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr style="background: #eee; text-align: left;">
                <th style="padding:10px;">Nume Grupă</th>
                <th style="padding:10px;">Sport</th>
                <th style="padding:10px;">Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="g : ${grupe}" style="border-bottom: 1px solid #ddd;">
                <td th:text="${g.nume}" style="padding:10px;"></td>
                <td th:text="${g.sport.nume}" style="padding:10px;"></td>
                <td style="padding:10px;">
                    <a th:href="@{/grupe/editeaza/{id}(id=${g.grupaID})}"
                       style="background:orange; color:white; padding:5px 10px; text-decoration:none; border-radius:4px; margin-right:5px;">Editează</a>
                    <a th:href="@{/grupe/sterge/{id}(id=${g.grupaID})}"
                       onclick="return confirm('Ștergi această grupă?');"
                       style="background:red; color:white; padding:5px 10px; text-decoration:none; border-radius:4px;">Șterge</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${grupe.isEmpty()}" style="padding: 20px; color: #777;">Nu există grupe definite.</div>
    </div>
    <a th:href="@{/}" class="buton-meniu">Înapoi la Meniu</a>
</main>
</body>
</html>
