<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista Sporturi</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}" />
</head>
<body>
<header>
    <h1>Sporturi Disponibile</h1>
</header>
<main style="max-width: 1000px;">
    <div class="lista-container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 20px">
            <a th:href="@{/sporturi/adauga}" class="buton-adauga">+ Adaugă Sport Nou</a>

            <form th:action="@{/sporturi}" method="get" style="display: flex; gap: 8px; align-items: center;">
                <select name="tip" onchange="this.form.submit()"
                        style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px;">
                    <option value="">-- Toate Tipurile --</option>

                    <option value="Echipa" th:selected="${tipSelectat == 'Echipa'}">Echipă</option>
                    <option value="Individual" th:selected="${tipSelectat == 'Individual'}">Individual</option>
                </select>
                <input type="text" name="keyword" th:value="${keyword}" class="input-cautare" placeholder="Caută">
                <button type="submit" class="btn-cautare-base btn-albastru">Caută</button>
                <a th:href="@{/sporturi}" class="btn-cautare-base btn-gri">Resetează</a>
            </form>
        </div>

        <div th:if="${mesajEroare}"
             style="background-color: #f8d7da; color: #721c24; padding: 15px; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong>Eroare la ștergere:</strong>
            <span>Nu puteți șterge acest sport deoarece există deja echipe create care îl practică. Ștergeți întâi echipele respective!</span>
        </div>

        <div th:if="${mesajSucces}"
             style="background-color: #d4edda; color: #155724; padding: 15px; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong>Succes:</strong> <span th:text="${mesajSucces}"></span>
        </div>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr style="background-color: #eee; text-align: left;">
                <th style="padding: 10px;">Denumire</th>
                <th style="padding: 10px;">Tip</th>
                <th style="padding: 10px;">Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${sporturi}" style="border-bottom: 1px solid #ddd;">
                <td style="padding: 10px;" th:text="${s.nume}"></td>
                <td style="padding: 10px;" th:text="${s.tip}"></td>
                <td style="padding: 10px;">
                    <a th:href="@{/sporturi/editeaza/{id}(id=${s.sportID})}"
                       style="background:orange; color:white; padding:5px 10px; text-decoration:none; border-radius:4px; margin-right:5px;">Editează</a>
                    <a th:href="@{/sporturi/sterge/{id}(id=${s.sportID})}"
                       onclick="return confirm('Sigur dorești să ștergi acest sport?');"
                       style="background:red; color:white; padding:5px 10px; text-decoration:none; border-radius:4px;">Șterge</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${sporturi.empty}" style="padding: 20px; color: #777;">Nu există sporturi definite.</div>
    </div>
    <a th:href="@{/}" class="buton-meniu">Înapoi la Meniu</a>
</main>
</body>
</html>
