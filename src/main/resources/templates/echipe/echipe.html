<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista Echipe</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}" />
</head>
<body>
<header>
    <h1>Echipe Înscrise</h1>
</header>
<main>
    <div class="lista-container">

        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; margin-top: 10px; border-bottom: 1px solid #eee; padding-bottom: 20px;">

            <a th:href="@{/echipe/adauga}" class="buton-adauga"
               style="padding: 0 20px; font-size: 14px; white-space: nowrap; height: 38px; line-height: 38px; align-self: center;">
                + Adaugă Echipă Nouă
            </a>

            <form th:action="@{/echipe}" method="get" style="display: flex; flex-direction: column; gap: 10px; align-items: flex-end;">

                <div style="display: flex; gap: 8px;">
                    <input type="text" name="keyword" th:value="${keyword}" class="input-cautare"
                           placeholder="Caută echipă..."
                           style="padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; width: 250px; height: 38px;">

                    <button type="submit" class="btn-cautare-base btn-albastru" style="height: 38px; line-height: 38px; padding: 0 15px; font-size: 14px;">Caută</button>
                    <a th:href="@{/echipe}" class="btn-cautare-base btn-gri" style="height: 38px; line-height: 38px; padding: 0 15px; font-size: 14px;">Reset</a>
                </div>

                <div style="display: flex; gap: 8px;">

                    <select name="facultateId" onchange="this.form.submit()"
                            style="padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 220px; height: 38px; background-color: #f9f9f9; font-size: 13px;">
                        <option value="">-- Toate Facultățile --</option>
                        <option th:each="f : ${listaFacultati}"
                                th:value="${f.facultateID}"
                                th:text="${f.denumire}"
                                th:selected="${f.facultateID == facultateId}">
                        </option>
                    </select>

                    <select name="sportId" onchange="this.form.submit()"
                            style="padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 160px; height: 38px; background-color: #f9f9f9; font-size: 13px;">
                        <option value="">-- Toate Sporturile --</option>
                        <option th:each="s : ${listaSporturi}"
                                th:value="${s.sportID}"
                                th:text="${s.nume}"
                                th:selected="${s.sportID == sportId}">
                        </option>
                    </select>
                </div>

            </form>
        </div>

        <div th:if="${mesajEroare}"
             style="background-color: #f8d7da; color: #721c24; padding: 15px; border: 1px solid #f5c6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong>Eroare la ștergere:</strong>
            <span>Această echipă are membri înscriși sau meciuri programate în calendar. Nu poate fi ștearsă până nu este golită!</span>
        </div>

        <div th:if="${mesajSucces}"
             style="background-color: #d4edda; color: #155724; padding: 15px; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 20px;">
            <strong> Succes:</strong> <span th:text="${mesajSucces}"></span>
        </div>

        <table style="width: 100%; border-collapse: collapse;">
            <thead>
            <tr style="background-color: #eee; text-align: left;">
                <th style="padding: 10px;">Facultatea</th>
                <th style="padding: 10px;">Sportul</th>
                <th style="padding: 10px;">Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${echipe}" style="border-bottom: 1px solid #ddd;">
                <td style="padding: 10px;" th:text="${e.facultate.denumire}"></td>
                <td style="padding: 10px;" th:text="${e.sport.nume} + ' (' + ${e.sport.tip} + ')'"></td>

                <td style="padding: 10px; white-space: nowrap;">
                    <a th:href="@{/echipe/editeaza/{id}(id=${e.echipaID})}"
                       style="background:orange; color:white; padding:5px 10px; text-decoration:none; border-radius:4px; margin-right:5px;">Editează</a>
                    <a th:href="@{/echipe/sterge/{id}(id=${e.echipaID})}"
                       onclick="return confirm('Sigur dorești să ștergi această echipă?');"
                       style="background:red; color:white; padding:5px 10px; text-decoration:none; border-radius:4px;">Șterge</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${echipe.isEmpty()}" style="padding: 20px; color: #777;">Nu există echipe create.</div>
    </div>
    <a th:href="@{/}" class="buton-meniu">Înapoi la Meniu</a>
</main>
</body>
</html>
